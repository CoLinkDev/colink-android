name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Android
        uses: actions/checkout@v4
        with:
          path: colink-android

      - name: Checkout CastBoard
        uses: actions/checkout@v4
        with:
          repository: CoLinkDev/colink-castboard
          path: colink-castboard

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        working-directory: colink-android
        run: chmod +x gradlew

      - name: Decode keystore
        working-directory: colink-android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          # Generate versionCode from tag: major*10000 + minor*100 + patch
          IFS='.' read -r major minor patch <<< "$VERSION"
          CODE=$((major * 10000 + minor * 100 + ${patch:-0}))
          echo "VERSION_CODE=$CODE" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: colink-android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: softprops/action-gh-release@v2
        with:
          files: colink-android/app/build/outputs/apk/release/*.apk
