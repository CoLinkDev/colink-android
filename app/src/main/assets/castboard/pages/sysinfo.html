<!doctype html>
<html>
  <body>
    <div class="page page-sysinfo">
      <style>
        .page-sysinfo {
          z-index: 4;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background: radial-gradient(circle at 50% 50%, #0d0f14 0%, #050608 100%);
          padding: 40px 60px;
          box-sizing: border-box;
        }

        .sysinfo-grid {
          display: grid;
          grid-template-columns: repeat(12, minmax(0, 1fr));
          gap: 44px 54px;
          width: 100%;
          max-width: 1120px;
          box-sizing: border-box;
        }

        .sysinfo-metric[data-key="cpu"],
        .sysinfo-metric[data-key="mem"],
        .sysinfo-metric[data-key="gpu"] {
          grid-column: span 4;
        }

        .sysinfo-metric[data-key="netDown"],
        .sysinfo-metric[data-key="netUp"],
        .sysinfo-metric[data-key="diskRead"],
        .sysinfo-metric[data-key="diskWrite"] {
          grid-column: span 6;
        }

        /* Hide circular gauge for network and disk metrics */
        .sysinfo-metric[data-key="netDown"] .gauge-container,
        .sysinfo-metric[data-key="netUp"] .gauge-container,
        .sysinfo-metric[data-key="diskRead"] .gauge-container,
        .sysinfo-metric[data-key="diskWrite"] .gauge-container {
          display: none;
        }

        /* Set a fixed width for the label side in the bottom 4 metrics to align their value starting positions */
        .sysinfo-metric[data-key="netDown"] .metric-top,
        .sysinfo-metric[data-key="netUp"] .metric-top,
        .sysinfo-metric[data-key="diskRead"] .metric-top,
        .sysinfo-metric[data-key="diskWrite"] .metric-top {
          width: 140px;
        }

        .sysinfo-metric {
          display: flex;
          flex-direction: row;
          align-items: center;
          gap: 20px;
          transition: all 300ms ease;
          /* animation: fade-appear 600ms cubic-bezier(0.16, 1, 0.3, 1) both; */
        }

        /*
        .sysinfo-metric:nth-child(1) { animation-delay: 50ms; }
        .sysinfo-metric:nth-child(2) { animation-delay: 100ms; }
        .sysinfo-metric:nth-child(3) { animation-delay: 150ms; }
        */

        .metric-top {
          display: flex;
          flex-direction: row;
          align-items: center;
          gap: 12px;
          flex-shrink: 0;
        }

        .metric-meta {
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 2px;
        }

        .metric-label {
          font-size: 24px;
          font-weight: 800;
          color: #ffffff;
          line-height: 1.1;
          letter-spacing: -0.01em;
          white-space: nowrap;
        }

        .metric-desc {
          font-size: 11px;
          font-weight: 700;
          color: rgba(248, 250, 252, 0.5);
          line-height: 1.1;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          white-space: nowrap;
        }

        /* Gauge */
        .gauge-container {
          position: relative;
          width: 40px;
          height: 40px;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .gauge-svg {
          width: 100%;
          height: 100%;
        }

        .gauge-track {
          fill: none;
          stroke: rgba(255, 255, 255, 0.18);
          stroke-width: 16;
        }

        .gauge-fill {
          fill: none;
          stroke: #ffffff;
          stroke-width: 16;
          stroke-linecap: round;
          transform: rotate(-90deg);
          transform-origin: center;
          transition: stroke-dashoffset 450ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sysinfo-metric.high-load .gauge-fill {
          stroke: #ef4444;
        }

        .metric-value-container {
          display: flex;
          align-items: baseline;
        }

        .metric-value {
          font-family: "CastBoard Google Sans Flex", sans-serif;
          font-size: 48px;
          font-weight: 800;
          color: #ffffff;
          line-height: 0.9;
          letter-spacing: -0.04em;
        }

        .metric-unit {
          margin-left: 6px;
          font-size: 16px;
          font-weight: 800;
          color: rgba(248, 250, 252, 0.5);
          line-height: 1;
        }

        .sysinfo-metric[data-empty="true"] {
          opacity: 0.35;
        }

        /* Animations */
        /*
        @keyframes fade-appear {
          from {
            opacity: 0;
            transform: translateY(16px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
        */

        /* Responsive */
        @media (max-aspect-ratio: 1/1) {
          .page-sysinfo {
            padding: 40px 24px;
          }

          .sysinfo-grid {
            grid-template-columns: 1fr;
            gap: 40px;
            max-width: 300px;
          }

          .sysinfo-metric[data-key="cpu"],
          .sysinfo-metric[data-key="mem"],
          .sysinfo-metric[data-key="gpu"],
          .sysinfo-metric[data-key="netDown"],
          .sysinfo-metric[data-key="netUp"],
          .sysinfo-metric[data-key="diskRead"],
          .sysinfo-metric[data-key="diskWrite"] {
            grid-column: auto;
          }

          /* Reset fixed width for mobile responsive layout */
          .sysinfo-metric[data-key="netDown"] .metric-top,
          .sysinfo-metric[data-key="netUp"] .metric-top,
          .sysinfo-metric[data-key="diskRead"] .metric-top,
          .sysinfo-metric[data-key="diskWrite"] .metric-top {
            width: auto;
          }

          .metric-value {
            font-size: 36px;
          }
        }
      </style>

      <div class="sysinfo-grid">
        <section class="sysinfo-metric" data-key="cpu">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">CPU</span>
              <span class="metric-desc">Processor</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span>
          </div>
        </section>

        <section class="sysinfo-metric" data-key="mem">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">MEM</span>
              <span class="metric-desc">Memory</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span>
          </div>
        </section>

        <section class="sysinfo-metric" data-key="gpu">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">GPU</span>
              <span class="metric-desc">Graphics</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span><span class="metric-unit" data-unit></span>
          </div>
        </section>

        <section class="sysinfo-metric" data-key="netDown">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">NET IN</span>
              <span class="metric-desc">Download</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span><span class="metric-unit" data-unit></span>
          </div>
        </section>

        <section class="sysinfo-metric" data-key="netUp">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">NET OUT</span>
              <span class="metric-desc">Upload</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span><span class="metric-unit" data-unit></span>
          </div>
        </section>

        <section class="sysinfo-metric" data-key="diskRead">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">DISK R</span>
              <span class="metric-desc">Read</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span><span class="metric-unit" data-unit></span>
          </div>
        </section>

        <section class="sysinfo-metric" data-key="diskWrite">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">DISK W</span>
              <span class="metric-desc">Write</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span><span class="metric-unit" data-unit></span>
          </div>
        </section>
      </div>
    </div>

    <script>
      (function() {
        let mountedContainer = null;

        const translations = {
          en: {
            cpuDesc: "Processor",
            memDesc: "Memory",
            gpuDesc: "Graphics",
            netDownDesc: "Download",
            netUpDesc: "Upload",
            diskReadDesc: "Read",
            diskWriteDesc: "Write"
          },
          zh_CN: {
            cpuDesc: "处理器",
            memDesc: "内存",
            gpuDesc: "图形",
            netDownDesc: "下载",
            netUpDesc: "上传",
            diskReadDesc: "读取",
            diskWriteDesc: "写入"
          },
          zh_TW: {
            cpuDesc: "處理器",
            memDesc: "記憶體",
            gpuDesc: "圖形",
            netDownDesc: "下載",
            netUpDesc: "上傳",
            diskReadDesc: "讀取",
            diskWriteDesc: "寫入"
          },
          de: {
            cpuDesc: "Prozessor",
            memDesc: "Speicher",
            gpuDesc: "Grafik",
            netDownDesc: "Download",
            netUpDesc: "Upload",
            diskReadDesc: "Lesen",
            diskWriteDesc: "Schreiben"
          },
          es: {
            cpuDesc: "Procesador",
            memDesc: "Memoria",
            gpuDesc: "Gráficos",
            netDownDesc: "Descarga",
            netUpDesc: "Subida",
            diskReadDesc: "Lectura",
            diskWriteDesc: "Escritura"
          },
          ja: {
            cpuDesc: "プロセッサ",
            memDesc: "メモリ",
            gpuDesc: "グラフィックス",
            netDownDesc: "ダウンロード",
            netUpDesc: "アップロード",
            diskReadDesc: "読み取り",
            diskWriteDesc: "書き込み"
          },
          ko: {
            cpuDesc: "프로세서",
            memDesc: "메모리",
            gpuDesc: "그래픽",
            netDownDesc: "다운로드",
            netUpDesc: "업로드",
            diskReadDesc: "읽기",
            diskWriteDesc: "쓰기"
          },
          ru: {
            cpuDesc: "Процессор",
            memDesc: "Память",
            gpuDesc: "Графика",
            netDownDesc: "Загрузка",
            netUpDesc: "Отдача",
            diskReadDesc: "Чтение",
            diskWriteDesc: "Запись"
          }
        };

        function getLocale() {
          const lang = (document.documentElement.getAttribute("lang") || "").toLowerCase();
          
          if (lang.startsWith("zh-tw") || lang.startsWith("zh-hk") || lang.startsWith("zh-hant")) {
            return translations.zh_TW;
          }
          if (lang.startsWith("zh")) {
            return translations.zh_CN;
          }
          if (lang.startsWith("de")) {
            return translations.de;
          }
          if (lang.startsWith("es")) {
            return translations.es;
          }
          if (lang.startsWith("ja")) {
            return translations.ja;
          }
          if (lang.startsWith("ko")) {
            return translations.ko;
          }
          if (lang.startsWith("ru")) {
            return translations.ru;
          }
          return translations.en;
        }

        function normalize(value) {
          if (value === null || value === undefined) return null;
          const parsed = Number(value);
          if (!Number.isFinite(parsed)) return null;
          return Math.min(100, Math.max(0, parsed));
        }

        function localizeUI(container) {
          const t = getLocale();
          
          // Localize descriptions
          const cpuDesc = container.querySelector(`[data-key="cpu"] .metric-desc`);
          const memDesc = container.querySelector(`[data-key="mem"] .metric-desc`);
          const gpuDesc = container.querySelector(`[data-key="gpu"] .metric-desc`);
          const netDownDesc = container.querySelector(`[data-key="netDown"] .metric-desc`);
          const netUpDesc = container.querySelector(`[data-key="netUp"] .metric-desc`);
          const diskReadDesc = container.querySelector(`[data-key="diskRead"] .metric-desc`);
          const diskWriteDesc = container.querySelector(`[data-key="diskWrite"] .metric-desc`);
          if (cpuDesc) cpuDesc.textContent = t.cpuDesc;
          if (memDesc) memDesc.textContent = t.memDesc;
          if (gpuDesc) gpuDesc.textContent = t.gpuDesc;
          if (netDownDesc) netDownDesc.textContent = t.netDownDesc;
          if (netUpDesc) netUpDesc.textContent = t.netUpDesc;
          if (diskReadDesc) diskReadDesc.textContent = t.diskReadDesc;
          if (diskWriteDesc) diskWriteDesc.textContent = t.diskWriteDesc;
        }

        // Format speed rate in B/s, KB/s, MB/s, GB/s
        function formatRate(value) {
          if (value === null || value === undefined) return { value: "--", unit: "" };
          const bytes = Math.max(0, Number(value));
          if (!Number.isFinite(bytes)) return { value: "--", unit: "" };
          const units = ["B/s", "KB/s", "MB/s", "GB/s"];
          let scaled = bytes;
          let index = 0;
          while (scaled >= 1024 && index < units.length - 1) {
            scaled /= 1024;
            index += 1;
          }
          const text = scaled >= 100 || index === 0 ? String(Math.round(scaled)) : scaled.toFixed(1);
          return { value: text, unit: units[index] };
        }

        function render(container) {
          const latestStats = parent.window.latestSysInfoStats;
          if (!container || !latestStats) return;

          for (const key of ["cpu", "mem", "gpu"]) {
            const metric = container.querySelector(`[data-key="${key}"]`);
            const valueEl = metric?.querySelector("[data-value]");
            const fillEl = metric?.querySelector("[data-fill]");
            const unitEl = metric?.querySelector("[data-unit]");
            if (!metric || !valueEl || !fillEl) continue;

            const value = normalize(latestStats[key]);
            metric.dataset.empty = value == null ? "true" : "false";
            valueEl.textContent = value == null ? "--" : String(Math.round(value));
            if (unitEl) unitEl.textContent = "";
            
            // Circumference of r=50 circle is 2 * PI * 50 = 314.159
            const dashoffset = value == null ? 314.159 : 314.159 * (1 - value / 100);
            fillEl.setAttribute("stroke-dashoffset", String(dashoffset));

            if (value !== null && value > 75) {
              metric.classList.add("high-load");
            } else {
              metric.classList.remove("high-load");
            }
          }

          for (const key of ["netDown", "netUp", "diskRead", "diskWrite"]) {
            const metric = container.querySelector(`[data-key="${key}"]`);
            const valueEl = metric?.querySelector("[data-value]");
            const fillEl = metric?.querySelector("[data-fill]");
            const unitEl = metric?.querySelector("[data-unit]");
            if (!metric || !valueEl || !fillEl || !unitEl) continue;

            const raw = latestStats[key];
            const empty = raw == null;
            const formatted = formatRate(raw);
            metric.dataset.empty = empty ? "true" : "false";
            valueEl.textContent = formatted.value;
            unitEl.textContent = formatted.unit;
            fillEl.setAttribute("stroke-dashoffset", "314.159");
            metric.classList.remove("high-load");
          }
        }

        parent.window.addEventListener("sysinfo-stats-change", () => render(mountedContainer));

        parent.pages.sysinfo = {
          template: document.body.innerHTML,
          mount(container) {
            mountedContainer = container;
            localizeUI(container);
            render(container);
          },
          unmount() {
            mountedContainer = null;
          },
          cleanup() {
            mountedContainer = null;
          }
        };
      })();
    </script>
  </body>
</html>
