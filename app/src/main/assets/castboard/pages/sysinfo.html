<!doctype html>
<html>
  <body>
    <div class="page page-sysinfo">
      <style>
        .page-sysinfo {
          z-index: 4;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          background: radial-gradient(circle at 50% 50%, #0d0f14 0%, #050608 100%);
          padding: 40px 60px;
          box-sizing: border-box;
        }

        .sysinfo-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 6vw;
          width: 100%;
          max-width: 900px;
          box-sizing: border-box;
        }

        .sysinfo-metric {
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          gap: 20px;
          transition: all 300ms ease;
          /* animation: fade-appear 600ms cubic-bezier(0.16, 1, 0.3, 1) both; */
        }

        /*
        .sysinfo-metric:nth-child(1) { animation-delay: 50ms; }
        .sysinfo-metric:nth-child(2) { animation-delay: 100ms; }
        .sysinfo-metric:nth-child(3) { animation-delay: 150ms; }
        */

        .metric-top {
          display: flex;
          flex-direction: row;
          align-items: center;
          gap: 12px;
        }

        .metric-meta {
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 2px;
        }

        .metric-label {
          font-size: 24px;
          font-weight: 800;
          color: #ffffff;
          line-height: 1.1;
          letter-spacing: -0.01em;
        }

        .metric-desc {
          font-size: 11px;
          font-weight: 700;
          color: rgba(248, 250, 252, 0.5);
          line-height: 1.1;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }

        /* Gauge */
        .gauge-container {
          position: relative;
          width: 40px;
          height: 40px;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .gauge-svg {
          width: 100%;
          height: 100%;
        }

        .gauge-track {
          fill: none;
          stroke: rgba(255, 255, 255, 0.18);
          stroke-width: 16;
        }

        .gauge-fill {
          fill: none;
          stroke: #ffffff;
          stroke-width: 16;
          stroke-linecap: round;
          transform: rotate(-90deg);
          transform-origin: center;
          /* transition: stroke-dashoffset 450ms cubic-bezier(0.16, 1, 0.3, 1); */
        }

        .sysinfo-metric.high-load .gauge-fill {
          stroke: #ef4444;
        }

        .metric-value-container {
          display: flex;
          align-items: baseline;
        }

        .metric-value {
          font-family: "CastBoard Google Sans Flex", sans-serif;
          font-size: 96px;
          font-weight: 800;
          color: #ffffff;
          line-height: 0.9;
          letter-spacing: -0.04em;
        }

        .sysinfo-metric[data-empty="true"] {
          opacity: 0.35;
        }

        /* Animations */
        /*
        @keyframes fade-appear {
          from {
            opacity: 0;
            transform: translateY(16px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
        */

        /* Responsive */
        @media (max-aspect-ratio: 1/1) {
          .page-sysinfo {
            padding: 40px 24px;
          }

          .sysinfo-grid {
            grid-template-columns: 1fr;
            gap: 40px;
            max-width: 300px;
          }

          .metric-value {
            font-size: 80px;
          }
        }
      </style>

      <div class="sysinfo-grid">
        <section class="sysinfo-metric" data-key="cpu">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">CPU</span>
              <span class="metric-desc">Processor</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span>
          </div>
        </section>

        <section class="sysinfo-metric" data-key="mem">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">MEM</span>
              <span class="metric-desc">Memory</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span>
          </div>
        </section>

        <section class="sysinfo-metric" data-key="gpu">
          <div class="metric-top">
            <div class="gauge-container">
              <svg class="gauge-svg" viewBox="0 0 120 120" width="100%" height="100%">
                <circle class="gauge-track" cx="60" cy="60" r="50" />
                <circle class="gauge-fill" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159" data-fill />
              </svg>
            </div>
            <div class="metric-meta">
              <span class="metric-label">GPU</span>
              <span class="metric-desc">Graphics</span>
            </div>
          </div>
          <div class="metric-value-container">
            <span class="metric-value" data-value>--</span>
          </div>
        </section>
      </div>
    </div>

    <script>
      (function() {
        let mountedContainer = null;

        const translations = {
          en: {
            cpuDesc: "Processor",
            memDesc: "Memory",
            gpuDesc: "Graphics"
          },
          zh_CN: {
            cpuDesc: "处理器",
            memDesc: "内存",
            gpuDesc: "图形"
          },
          zh_TW: {
            cpuDesc: "處理器",
            memDesc: "記憶體",
            gpuDesc: "圖形"
          },
          de: {
            cpuDesc: "Prozessor",
            memDesc: "Speicher",
            gpuDesc: "Grafik"
          },
          es: {
            cpuDesc: "Procesador",
            memDesc: "Memoria",
            gpuDesc: "Gráficos"
          },
          ja: {
            cpuDesc: "プロセッサ",
            memDesc: "メモリ",
            gpuDesc: "グラフィックス"
          },
          ko: {
            cpuDesc: "프로세서",
            memDesc: "메모리",
            gpuDesc: "그래픽"
          },
          ru: {
            cpuDesc: "Процессор",
            memDesc: "Память",
            gpuDesc: "Графика"
          }
        };

        function getLocale() {
          const lang = (document.documentElement.getAttribute("lang") || "").toLowerCase();
          
          if (lang.startsWith("zh-tw") || lang.startsWith("zh-hk") || lang.startsWith("zh-hant")) {
            return translations.zh_TW;
          }
          if (lang.startsWith("zh")) {
            return translations.zh_CN;
          }
          if (lang.startsWith("de")) {
            return translations.de;
          }
          if (lang.startsWith("es")) {
            return translations.es;
          }
          if (lang.startsWith("ja")) {
            return translations.ja;
          }
          if (lang.startsWith("ko")) {
            return translations.ko;
          }
          if (lang.startsWith("ru")) {
            return translations.ru;
          }
          return translations.en;
        }

        function normalize(value) {
          if (value === null || value === undefined) return null;
          const parsed = Number(value);
          if (!Number.isFinite(parsed)) return null;
          return Math.min(100, Math.max(0, parsed));
        }

        function localizeUI(container) {
          const t = getLocale();
          
          // Localize descriptions
          const cpuDesc = container.querySelector(`[data-key="cpu"] .metric-desc`);
          const memDesc = container.querySelector(`[data-key="mem"] .metric-desc`);
          const gpuDesc = container.querySelector(`[data-key="gpu"] .metric-desc`);
          if (cpuDesc) cpuDesc.textContent = t.cpuDesc;
          if (memDesc) memDesc.textContent = t.memDesc;
          if (gpuDesc) gpuDesc.textContent = t.gpuDesc;
        }

        function render(container) {
          const latestStats = parent.window.latestSysInfoStats;
          if (!container || !latestStats) return;

          for (const key of ["cpu", "mem", "gpu"]) {
            const metric = container.querySelector(`[data-key="${key}"]`);
            const valueEl = metric?.querySelector("[data-value]");
            const fillEl = metric?.querySelector("[data-fill]");
            if (!metric || !valueEl || !fillEl) continue;

            const value = normalize(latestStats[key]);
            metric.dataset.empty = value == null ? "true" : "false";
            valueEl.textContent = value == null ? "--" : String(Math.round(value));
            
            // Circumference of r=50 circle is 2 * PI * 50 = 314.159
            const dashoffset = value == null ? 314.159 : 314.159 * (1 - value / 100);
            fillEl.setAttribute("stroke-dashoffset", String(dashoffset));

            if (value !== null && value > 75) {
              metric.classList.add("high-load");
            } else {
              metric.classList.remove("high-load");
            }
          }
        }

        parent.window.addEventListener("sysinfo-stats-change", () => render(mountedContainer));

        parent.pages.sysinfo = {
          template: document.body.innerHTML,
          mount(container) {
            mountedContainer = container;
            localizeUI(container);
            render(container);
          },
          unmount() {
            mountedContainer = null;
          },
          cleanup() {
            mountedContainer = null;
          }
        };
      })();
    </script>
  </body>
</html>
