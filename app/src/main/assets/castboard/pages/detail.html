<!doctype html>
<html>
  <body>
    <div class="page page-detail">
      <style>
        .page-detail {
          z-index: 2;
          display: grid;
          place-items: center;
          padding: 3.75vw;
          background: #000000;
        }

        .detail-shell {
          display: grid;
          grid-template-columns: var(--detail-art-size) minmax(0, 1fr);
          align-items: start;
          gap: 5vw;
          width: min(86vw, 100%);
          max-height: 100%;
        }

        .detail-art {
          aspect-ratio: 1;
          width: var(--detail-art-size);
          height: var(--detail-art-size);
          overflow: hidden;
          border: 0.05vw solid rgba(248, 250, 252, 0.1);
          border-radius: 0.63vw;
          background:
            linear-gradient(145deg, rgba(248, 250, 252, 0.12), rgba(248, 250, 252, 0.02)),
            #111318;
          box-shadow: 0 2.2vw 6.25vw rgba(0, 0, 0, 0.42);
        }

        .detail-cover {
          display: block;
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .detail-cover[hidden] {
          display: none !important;
        }

        .detail-copy {
          --detail-title-max: clamp(4.2vw, 18.5vh, 7.8vw);
          --detail-title-min: clamp(2.9vw, 10vh, 4.2vw);
          --detail-title-size: var(--detail-title-max);
          --detail-progress-bottom-offset: clamp(0.78vw, 2.4vh, 1.72vw);
          position: relative;
          height: var(--detail-art-size);
          min-width: 0;
        }

        .detail-title {
          margin: 0;
          margin-top: 0.25vw;
          color: #fffaf0;
          font-size: var(--detail-title-size);
          font-weight: 900;
          letter-spacing: 0;
          line-height: 1.02;
          overflow-wrap: anywhere;
        }

        .detail-meta-row {
          display: flex;
          align-items: baseline;
          gap: 1.5vw;
          margin: 2vw 0 0;
        }

        .detail-author {
          color: rgba(248, 250, 252, 0.72);
          font-size: clamp(2.2vw, 7.5vh, 3vw);
          font-weight: 700;
          line-height: 1.25;
          overflow-wrap: anywhere;
        }

        .detail-album {
          color: rgba(216, 222, 232, 0.5);
          font-size: clamp(2.2vw, 7.5vh, 3vw);
          font-weight: 700;
          line-height: 1.3;
          overflow-wrap: anywhere;
        }

        .detail-progress {
          position: absolute;
          right: 0;
          bottom: var(--detail-progress-bottom-offset);
          left: 0;
          width: 100%;
        }

        .detail-progress-time {
          display: flex;
          justify-content: flex-end;
          gap: 0.25vw;
          margin-bottom: 0.94vw;
        }

        .detail-progress-track {
          height: 0.63vw;
          overflow: hidden;
          border-radius: 9.99rem;
          background: rgba(248, 250, 252, 0.18);
        }

        .detail-progress-fill {
          width: 100%;
          height: 100%;
          border-radius: inherit;
          background: #f8fafc;
          transform: scaleX(0);
          transform-origin: left;
        }

        .detail-progress-elapsed,
        .detail-progress-duration,
        .detail-progress-separator {
          font-family: "CastBoard Google Sans Flex", "Google Sans Flex", sans-serif;
          color: rgba(216, 222, 232, 0.62);
          font-size: clamp(2vw, 6.5vh, 2.8vw);
          font-weight: 600;
          letter-spacing: -0.02em;
          line-height: 1.2;
        }
      </style>

      <div class="detail-shell">
        <div class="detail-art" aria-hidden="true">
          <img class="detail-cover" alt="" decoding="async" hidden />
        </div>
        <div class="detail-copy">
          <h1 class="detail-title"></h1>
          <div class="detail-meta-row">
            <span class="detail-author"></span>
            <span class="detail-album"></span>
          </div>

          <div class="detail-progress" aria-label="Playback Progress">
            <div class="detail-progress-time">
              <span class="detail-progress-elapsed">0:00</span>
              <span class="detail-progress-separator" aria-hidden="true">/</span>
              <span class="detail-progress-duration">0:00</span>
            </div>
            <div class="detail-progress-track">
              <div class="detail-progress-fill"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function() {
        const { readCssNumber, clampUnit, formatSeconds, cancelRaf, clearTimer, pages } = parent;

        let detailLayer = null;
        let detailArt = null;
        let detailCover = null;
        let detailCopy = null;
        let detailTitle = null;
        let detailAuthor = null;
        let detailAlbum = null;
        let detailProgressFill = null;
        let detailProgressElapsed = null;
        let detailProgressDuration = null;

        let detailRafId = 0;
        let detailHideTimer = 0;
        let lastElapsedSecond = -1;

        function titleVisualLength(value) {
          let length = 0;
          for (const char of value.trim()) {
            const code = char.codePointAt(0) ?? 0;
            if (/\s/.test(char)) {
              length += 0.25;
            } else if (code <= 0x7f) {
              length += 0.55;
            } else if (code <= 0xff) {
              length += 0.65;
            } else {
              length += 1;
            }
          }
          return length;
        }

        function titleSizeByLength(title, minSize, maxSize) {
          const length = titleVisualLength(title);
          const ratio = clampUnit((length - 10) / 18);
          const easedRatio = 1 - Math.pow(1 - ratio, 2);
          return maxSize - (maxSize - minSize) * easedRatio;
        }

        function setDetailTitleSize(size) {
          if (detailCopy) {
            detailCopy.style.setProperty("--detail-title-size", `${size.toFixed(1)}px`);
          }
        }

        function updateDetailTitleSize() {
          if (!detailCopy || !detailTitle) return;
          const minSize = readCssNumber(detailCopy, "--detail-title-min", 46);
          const maxSize = readCssNumber(detailCopy, "--detail-title-max", 86);
          const size = titleSizeByLength(detailTitle.textContent, minSize, maxSize);
          setDetailTitleSize(size);
        }

        function renderDetailMetadata() {
          if (!detailTitle) return;
          const title = parent.TRACK_INFO.title || "Unknown Song";
          const author = parent.TRACK_INFO.author || "Unknown Artist";
          const album = parent.TRACK_INFO.album || "";
          const cover = parent.TRACK_INFO.cover || "";

          detailTitle.textContent = title;
          detailAuthor.textContent = author;
          if (album === "") {
            detailAlbum.textContent = "\u00a0";
            detailAlbum.setAttribute("aria-hidden", "true");
          } else {
            detailAlbum.textContent = album;
            detailAlbum.removeAttribute("aria-hidden");
          }
          if (cover === "") {
            detailCover.hidden = true;
            detailCover.removeAttribute("src");
          } else if (detailCover.getAttribute("src") !== cover) {
            detailCover.hidden = true;
            detailCover.src = cover;
          }
          detailProgressDuration.textContent = parent.TRACK_INFO.durationHuman || formatSeconds(parent.duration);
          updateDetailTitleSize();
        }

        function renderDetailProgress() {
          if (!detailProgressFill) return;
          const elapsed = Math.max(0, parent.progressPosition);
          const durationSeconds = Number.isFinite(parent.duration) && parent.duration > 0 ? parent.duration : 0;
          const progress = durationSeconds > 0 ? clampUnit(elapsed / durationSeconds) : 0;

          const elapsedSec = Math.floor(elapsed);
          if (elapsedSec !== lastElapsedSecond) {
            const isNormalStep = lastElapsedSecond !== -1 && Math.abs(elapsedSec - lastElapsedSecond) === 1;
            if (isNormalStep) {
              detailProgressFill.style.transition = "transform 1s linear";
            } else {
              detailProgressFill.style.transition = "none";
            }
            lastElapsedSecond = elapsedSec;
            detailProgressFill.style.transform = `scaleX(${progress})`;
            detailProgressElapsed.textContent = formatSeconds(elapsed);
          }
        }

        function renderDetailPanel() {
          renderDetailMetadata();
          renderDetailProgress();
        }

        function onCoverError() {
          if (detailCover) {
            detailCover.hidden = true;
            detailCover.removeAttribute("src");
          }
        }

        function onCoverLoad() {
          if (detailCover) {
            detailCover.hidden = false;
          }
        }

        pages.detail = {
          template: document.body.innerHTML,
          mount(container) {
            lastElapsedSecond = -1;
            detailLayer = container;
            detailArt = container.querySelector(".detail-art");
            detailCover = container.querySelector(".detail-cover");
            detailCopy = container.querySelector(".detail-copy");
            detailTitle = container.querySelector(".detail-title");
            detailAuthor = container.querySelector(".detail-author");
            detailAlbum = container.querySelector(".detail-album");
            detailProgressFill = container.querySelector(".detail-progress-fill");
            detailProgressElapsed = container.querySelector(".detail-progress-elapsed");
            detailProgressDuration = container.querySelector(".detail-progress-duration");

            detailCover.addEventListener("load", onCoverLoad);
            detailCover.addEventListener("error", onCoverError);

            renderDetailPanel();
          },
          unmount() {
            if (detailCover) {
              detailCover.removeEventListener("load", onCoverLoad);
              detailCover.removeEventListener("error", onCoverError);
            }
            detailLayer = null;
            detailArt = null;
            detailCover = null;
            detailCopy = null;
            detailTitle = null;
            detailAuthor = null;
            detailAlbum = null;
            detailProgressFill = null;
            detailProgressElapsed = null;
            detailProgressDuration = null;
          },
          onTrackChange() {
            lastElapsedSecond = -1;
            renderDetailPanel();
          },
          onProgressChange() {
            renderDetailProgress();
          },
          onResize() {
            updateDetailTitleSize();
          },
          cleanup() {
            detailRafId = cancelRaf(detailRafId);
            detailHideTimer = clearTimer(detailHideTimer);
          }
        };
      })();
    </script>
  </body>
</html>
