<!doctype html>
<html>
  <body>
    <div class="page page-lyrics">
      <style>
        .page-lyrics {
          z-index: 1;
        }

        .stage {
          position: fixed;
          inset: 0;
          overflow: hidden;
        }


        .line {
          position: absolute;
          top: 0;
          left: var(--lyric-left);
          width: var(--lyric-width);
          margin: 0;
          text-align: left;
          color: #d8dee8;
          font-size: clamp(45px, min(6.4vw, 13vh), 100px);
          font-weight: 900;
          letter-spacing: 0;
          line-height: 1.16;
          overflow-wrap: break-word;
          word-break: normal;
          white-space: pre-line;
          transform-origin: left center;
          transform: translateY(var(--active-y)) scale(0.96);
          opacity: 0;
          pointer-events: none;
          will-change: transform, opacity;
          contain: layout style;
        }

        .line.is-current {
          color: #fffaf0;
        }

        .line-origin {
          display: block;
        }

        .line-translation {
          display: block;
          margin-top: 0.12em;
          font-size: clamp(22px, min(3.2vw, 6.2vh), 48px);
          line-height: 1.2;
          overflow-wrap: break-word;
          word-break: normal;
        }

        .track-info {
          position: fixed;
          right: 4vw;
          bottom: 2vw;
          text-align: right;
          z-index: 4;
          width: 90vw;
          pointer-events: none;
        }

        .track-info-source-icon {
          display: inline-block;
          vertical-align: middle;
          width: calc(clamp(18px, 2.6vh, 34px) * 0.85);
          height: calc(clamp(18px, 2.6vh, 34px) * 0.85);
          margin-right: 0.25em;
          object-fit: contain;
          filter: url(#colorize-title-color);
        }

        .track-info-source-icon[hidden] {
          display: none !important;
        }

        .track-info-text {
          display: inline-flex;
          align-items: baseline;
          vertical-align: middle;
          max-width: calc(100% - 2em);
        }

        .track-info-title,
        .track-info-author {
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
          font-size: clamp(18px, 2.6vh, 34px);
          font-weight: 700;
          line-height: 1.2;
        }

        .track-info-title {
          color: rgba(255, 250, 240, 0.84);
          flex: 0 0 auto;
          margin-right: 0.55em;
          max-width: 80%;
        }

        .track-info-author {
          color: rgba(216, 222, 232, 0.58);
          flex: 0 1 auto;
        }
      </style>

      <svg width="0" height="0" style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <filter id="colorize-title-color">
          <feColorMatrix type="matrix" values="
            1    0    0    0    0
            0    0.98 0    0    0
            0    0    0.94 0    0
            0    0    0    0.84 0
          "/>
        </filter>
      </svg>
      <main class="stage" aria-label="Lyrics"></main>
      <aside class="track-info" aria-label="Playback Info" aria-live="polite" hidden>
        <img class="track-info-source-icon" alt="" aria-hidden="true" hidden>
        <span class="track-info-text">
          <span class="track-info-title"></span>
          <span class="track-info-author"></span>
        </span>
      </aside>
    </div>

    <script>
      (function() {
        const { clearTimer, pages } = parent;

        let stage = null;
        let trackInfo = null;
        let trackInfoSourceIcon = null;
        let trackInfoTitle = null;
        let trackInfoAuthor = null;

        const OPACITY_TABLE = [1, 0.58, 0.28, 0.13, 0.04];
        const BLUR_TABLE = [0, 2.7, 3.9, 5.1, 6.3];
        const VISIBLE_BEFORE = 3;
        const VISIBLE_AFTER = 5;
        const LYRIC_TRANSITION_MS = 1260;
        const LYRIC_TRANSITION = "transform 1180ms var(--ease), opacity 980ms var(--ease)";

        const lineElements = new Map();
        let currentIndex = 0;
        let lastRenderedIndex = null;
        const heightCache = new Map();
        const SOURCE_ICONS = {
          ncm: "icons/neteasecloudmusic.svg",
          qqmusic: "icons/qqmusic.svg",
          applemusic: "icons/applemusic.svg",
          spotify: "icons/spotify.svg",
          ytmusic: "icons/youtubemusic.svg",
          bilibili: "icons/bilibili.svg",
          tidal: "icons/tidal.svg",
          deezer: "icons/deezer.svg",
        };

        function resetLyricsDom() {
          if (stage) stage.replaceChildren();
          lineElements.clear();
          heightCache.clear();
          lastRenderedIndex = null;
        }

        function visibleRangeFor(activeIndex) {
          return [
            Math.max(0, activeIndex - VISIBLE_BEFORE),
            Math.min(parent.LYRICS.length - 1, activeIndex + VISIBLE_AFTER),
          ];
        }

        function offsetsForVisibleRange(start, end, activeIndex, heights) {
          const offsets = new Map([[activeIndex, 0]]);
          const gap = parent.cachedGap;
          let offset = 0;
          for (let i = activeIndex + 1; i <= end; i += 1) {
            offset += (heights.get(i - 1) ?? 0) + gap;
            offsets.set(i, offset);
          }
          offset = 0;
          for (let i = activeIndex - 1; i >= start; i -= 1) {
            offset -= gap + (heights.get(i) ?? 0);
            offsets.set(i, offset);
          }
          return offsets;
        }

        function renderLyrics() {
          if (!stage) return;
          if (parent.LYRICS.length === 0) {
            resetLyricsDom();
            if (stage) stage.classList.remove("is-ready");
            return;
          }

          const active = currentIndex;
          const diff = lastRenderedIndex !== null ? Math.abs(active - lastRenderedIndex) : 0;
          const shouldAnimate = lastRenderedIndex !== null && diff >= 1 && diff <= 2;
          const activeY = parent.cachedActiveY;
          const [start, end] = visibleRangeFor(active);
          const offsets = offsetsForVisibleRange(start, end, active, heightCache);

          for (const [index, line] of lineElements) {
            const isVisible = index >= start && index <= end;
            if (!isVisible) {
              if (line._wasVisible !== false) {
                line.style.visibility = "hidden";
                line.style.opacity = "0";
                line.style.transition = "none";
                line.style.filter = "none";
                line._activeTransition = "none";
                line._wasVisible = false;
              }
              continue;
            }

            line.style.visibility = "visible";

            const distance = index - active;
            const absDistance = Math.abs(distance);
            const offset = offsets.get(index) ?? 0;
            const translateY = activeY + offset;
            const scale = Math.max(0.84, 1.08 - absDistance * 0.075);
            const opacity = OPACITY_TABLE[absDistance] ?? 0;
            const blur = BLUR_TABLE[absDistance] ?? 0;

            const targetTransition = shouldAnimate && line._wasVisible ? LYRIC_TRANSITION : "none";
            if (line._activeTransition !== targetTransition) {
              line.style.transition = targetTransition;
              line._activeTransition = targetTransition;
            }

            line.classList.toggle("is-current", distance === 0);
            line.style.transform = `translate3d(0, ${translateY}px, 0) scale(${scale})`;
            line.style.opacity = String(opacity);
            line.style.filter = blur > 0 ? `blur(${blur}px)` : "none";
            line.style.zIndex = String(20 - absDistance);
            line._wasVisible = true;
          }

          lastRenderedIndex = active;
        }

        function layoutLyrics() {
          if (parent.currentPageName !== "lyrics") return;
          if (stage) stage.classList.remove("is-ready");

          currentIndex = parent.activeIndex;
          resetLyricsDom();

          if (parent.LYRICS.length === 0) return;

          const fragment = document.createDocumentFragment();
          for (let i = 0; i < parent.LYRICS.length; i += 1) {
            const line = document.createElement("div");
            line.className = "line";
            line.dataset.index = String(i);
            line.style.opacity = "0";
            line.style.visibility = "hidden";
            line.style.transition = "none";
            line._activeTransition = "none";
            line._wasVisible = false;

            const origin = document.createElement("div");
            origin.className = "line-origin";
            origin.textContent = parent.LYRICS[i].text;
            line.appendChild(origin);

            if (parent.LYRICS[i].translation) {
              const translation = document.createElement("div");
              translation.className = "line-translation";
              translation.textContent = parent.LYRICS[i].translation;
              line.appendChild(translation);
            }

            fragment.appendChild(line);
            lineElements.set(i, line);
          }
          stage.appendChild(fragment);

          for (let i = 0; i < parent.LYRICS.length; i += 1) {
            const line = lineElements.get(i);
            heightCache.set(i, line.offsetHeight);
          }

          renderLyrics();

          if (lineElements.size > 0 && stage) {
            stage.classList.add("is-ready");
          }
        }

        function renderTrackSummary() {
          if (!trackInfo) return;
          const title = parent.TRACK_INFO.title;
          const author = parent.TRACK_INFO.author;
          const sourceIcon = SOURCE_ICONS[parent.TRACK_INFO.source] || "";
          const hasInfo = title !== "" || author !== "";

          trackInfo.hidden = !hasInfo;
          trackInfoSourceIcon.hidden = sourceIcon === "";
          if (sourceIcon && trackInfoSourceIcon.src !== sourceIcon) {
            trackInfoSourceIcon.src = sourceIcon;
          }
          trackInfoTitle.hidden = title === "";
          trackInfoAuthor.hidden = author === "";
          trackInfoTitle.textContent = title;
          trackInfoAuthor.textContent = author;
        }

        pages.lyrics = {
          template: document.body.innerHTML,
          mount(container) {
            stage = container.querySelector(".stage");
            trackInfo = container.querySelector(".track-info");
            trackInfoSourceIcon = container.querySelector(".track-info-source-icon");
            trackInfoTitle = container.querySelector(".track-info-title");
            trackInfoAuthor = container.querySelector(".track-info-author");

            resetLyricsDom();
            renderTrackSummary();
            layoutLyrics();
          },
          unmount() {
            resetLyricsDom();
            stage = null;
            trackInfo = null;
            trackInfoSourceIcon = null;
            trackInfoTitle = null;
            trackInfoAuthor = null;
          },
          onTrackChange() {
            renderTrackSummary();
          },
          onProgressChange() {
            const nextIndex = parent.activeIndex;
            if (nextIndex !== currentIndex) {
              currentIndex = nextIndex;
              renderLyrics();
            }
          },
          onResize() {
            heightCache.clear();
            for (const [index, line] of lineElements) {
              heightCache.set(index, line.offsetHeight);
            }
            renderLyrics();
          },
          layoutLyrics() {
            layoutLyrics();
          },
          cleanup() {
            resetLyricsDom();
          }
        };
      })();
    </script>
  </body>
</html>
