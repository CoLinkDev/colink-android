<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>CastBoard</title>
    <link rel="stylesheet" href="main.css" />
    <style>
      .debug-overlay {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 9999;
        margin: 0;
        padding: 8px 10px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.82);
        color: #111827;
        font: 18px monospace;
        line-height: 1.35;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app-root"></div>
    <pre id="castboard-debug" class="debug-overlay" hidden></pre>

    <script src="data.js"></script>
    <script src="main.js"></script>

    <!-- Hidden loader iframes to load page templates, styles and scripts -->
    <iframe id="iframe-lyrics" src="pages/lyrics.html" style="display: none;" onload="onIframeLoad('lyrics')"></iframe>
    <iframe id="iframe-detail" src="pages/detail.html" style="display: none;" onload="onIframeLoad('detail')"></iframe>
    <!-- <iframe id="iframe-placeholder" src="pages/placeholder.html" style="display: none;" onload="onIframeLoad('placeholder')"></iframe> -->
  </body>
</html>
