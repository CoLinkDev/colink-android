<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CastBoard</title>
    <style>
      :root {
        color-scheme: dark;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
        --line-gap: clamp(22px, 4.2vh, 54px);
        --active-y: 30vh;
        --lyric-left: clamp(34px, 6.2vw, 112px);
        --lyric-width: 80vw;
        --cursor-inverter-size: clamp(52px, 5.6vw, 90px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050608;
        color: #f8fafc;
        cursor: none !important;
        user-select: none;
      }

      *,
      *::before,
      *::after {
        cursor: none !important;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Roboto",
          "SF Pro Display",
          "Segoe UI Variable Display",
          "Segoe UI",
          "Microsoft YaHei UI",
          sans-serif;
      }

      .stage {
        position: fixed;
        inset: 0;
        overflow: hidden;
        opacity: 0;
        transition: opacity 220ms ease-out;
      }

      .stage.is-ready {
        opacity: 1;
      }

      .stage::before,
      .stage::after {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        height: 24vh;
        z-index: 2;
        pointer-events: none;
        will-change: transform;
        transform: translateZ(0);
      }

      .stage::before {
        top: 0;
        background: linear-gradient(to bottom, #050608 4%, rgba(5, 6, 8, 0));
      }

      .stage::after {
        bottom: 0;
        background: linear-gradient(to top, #050608 6%, rgba(5, 6, 8, 0));
      }

      .line {
        position: absolute;
        top: 0;
        left: var(--lyric-left);
        width: var(--lyric-width);
        margin: 0;
        text-align: left;
        color: #d8dee8;
        font-size: clamp(30px, 5.2vw, 96px);
        font-weight: 720;
        letter-spacing: 0;
        line-height: 1.16;
        overflow-wrap: break-word;
        word-break: normal;
        white-space: pre-line;
        transform-origin: left center;
        transform: translateY(var(--active-y)) scale(0.96);
        opacity: 0;
        pointer-events: none;
        will-change: transform, opacity;
        contain: layout style;
      }

      .line.is-current {
        color: #fffaf0;
      }

      .track-info {
        position: fixed;
        right: clamp(22px, 4vw, 72px);
        bottom: clamp(18px, 4vh, 54px);
        display: flex;
        align-items: baseline;
        justify-content: flex-end;
        gap: 0.55em;
        z-index: 4;
        max-width: 90vw;
        pointer-events: none;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.54);
      }

      .track-info-title,
      .track-info-author {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: clamp(19.5px, 2.025vw, 30px);
        font-weight: 620;
        line-height: 1.2;
      }

      .track-info-title {
        color: rgba(255, 250, 240, 0.84);
        flex: 0 1 auto;
      }

      .track-info-author {
        color: rgba(216, 222, 232, 0.58);
        flex: 0 1000 auto;
        min-width: 20%;
      }

      .detail-layer[hidden] {
        display: none !important;
      }

      .detail-layer {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 72px;
        background: #050608;
        backdrop-filter: blur(20px) saturate(122%);
        opacity: 0;
        pointer-events: none;
        transform: scale(1.01);
        transition:
          opacity 220ms ease-out,
          transform 220ms ease-out;
      }

      .detail-layer.is-open {
        opacity: 1;
        pointer-events: auto;
        transform: none;
      }

      .detail-shell {
        --detail-art-size: min(clamp(260px, 31vw, 390px), calc(100vh - 144px));
        display: grid;
        grid-template-columns: var(--detail-art-size) minmax(0, 1fr);
        align-items: start;
        gap: 64px;
        width: min(1180px, 100%);
        max-height: 100%;
      }

      .detail-art {
        aspect-ratio: 1;
        width: var(--detail-art-size);
        height: var(--detail-art-size);
        overflow: hidden;
        border: 1px solid rgba(248, 250, 252, 0.1);
        border-radius: 8px;
        background:
          linear-gradient(145deg, rgba(248, 250, 252, 0.12), rgba(248, 250, 252, 0.02)),
          #111318;
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      }

      .detail-cover {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .detail-cover[hidden] {
        display: none !important;
      }

      .detail-copy {
        --detail-title-max: 86px;
        --detail-title-min: 46px;
        --detail-title-size: var(--detail-title-max);
        --detail-progress-bottom-offset: clamp(10px, 1.6vh, 22px);
        position: relative;
        height: var(--detail-art-size);
        min-width: 0;
      }

      .detail-title {
        margin: 0;
        color: #fffaf0;
        font-size: var(--detail-title-size);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.02;
        overflow-wrap: anywhere;
      }

      .detail-author {
        margin: 26px 0 0;
        color: rgba(248, 250, 252, 0.72);
        font-size: 32px;
        font-weight: 620;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .detail-album {
        margin: 10px 0 0;
        color: rgba(216, 222, 232, 0.5);
        font-size: 24px;
        font-weight: 560;
        line-height: 1.3;
        overflow-wrap: anywhere;
      }

      .detail-progress {
        position: absolute;
        right: 0;
        bottom: var(--detail-progress-bottom-offset);
        left: 0;
        width: 100%;
      }

      .detail-progress-time {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 12px;
      }

      .detail-progress-track {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(248, 250, 252, 0.18);
      }

      .detail-progress-fill {
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: #f8fafc;
        transition: width 180ms ease-out;
      }

      .detail-progress-elapsed,
      .detail-progress-duration,
      .detail-progress-separator {
        color: rgba(216, 222, 232, 0.62);
        font-size: 22px;
        font-variant-numeric: tabular-nums;
        line-height: 1.2;
      }



      @media (max-width: 900px) {
        :root {
          --lyric-left: clamp(20px, 5vw, 40px);
          --lyric-width: calc(100vw - var(--lyric-left) * 2);
          --line-gap: clamp(16px, 3vh, 32px);
        }

        .line {
          font-size: clamp(28px, 8vw, 72px);
        }

        .track-info {
          max-width: calc(100vw - 40px);
        }
      }

      @media (max-width: 900px) and (orientation: portrait) {
        .detail-layer {
          place-items: start stretch;
          padding: 32px 24px;
        }

        .detail-shell {
          --detail-art-size: min(260px, 58vw);
          grid-template-columns: 1fr;
          align-items: start;
          gap: 30px;
          width: 100%;
        }

        .detail-art {
          width: var(--detail-art-size);
          height: var(--detail-art-size);
        }

        .detail-copy {
          --detail-title-max: 58px;
          --detail-title-min: 36px;
          position: static;
          height: auto;
        }

        .detail-title {
          font-size: var(--detail-title-size);
        }

        .detail-author {
          font-size: 28px;
        }

        .detail-album {
          font-size: 21px;
        }

        .detail-progress {
          position: static;
          margin-top: 40px;
        }
      }

      @media (max-width: 520px) and (orientation: portrait) {
        .detail-layer {
          padding: 26px 20px;
        }

        .detail-copy {
          --detail-title-max: 42px;
          --detail-title-min: 30px;
        }

        .detail-author {
          margin-top: 20px;
          font-size: 24px;
        }

        .detail-album {
          font-size: 18px;
        }

        .detail-progress {
          margin-top: 34px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="歌词显示区"></main>
    <aside class="track-info" aria-label="播放信息" aria-live="polite" hidden>
      <span class="track-info-title"></span>
      <span class="track-info-author"></span>
    </aside>
    <section class="detail-layer" aria-label="歌曲详情" aria-live="polite" hidden>
      <div class="detail-shell">
        <div class="detail-art" aria-hidden="true">
          <img class="detail-cover" alt="" hidden />
        </div>
        <div class="detail-copy">
          <h1 class="detail-title"></h1>
          <p class="detail-author"></p>
          <p class="detail-album"></p>

          <div class="detail-progress" aria-label="播放进度">
            <div class="detail-progress-time">
              <span class="detail-progress-elapsed">0:00</span>
              <span class="detail-progress-separator" aria-hidden="true">/</span>
              <span class="detail-progress-duration">0:00</span>
            </div>
            <div class="detail-progress-track">
              <div class="detail-progress-fill"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="data.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
