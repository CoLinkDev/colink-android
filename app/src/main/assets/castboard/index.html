<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>CastBoard</title>
    <script>
      (() => {
        const root = document.documentElement;
        const hostParams = window.location.search || window.location.hash.slice(1);
        const params = new URLSearchParams(hostParams);
        const isAndroidHost = params.get("host") === "android";

        function clamp(min, value, max) {
          return Math.min(max, Math.max(min, value));
        }

        function syncViewportMetrics() {
          const density = isAndroidHost ? Math.max(1, Number(window.devicePixelRatio) || 1) : 1;
          const physicalWidth = window.innerWidth * density;
          const physicalHeight = window.innerHeight * density;
          const isNarrow = physicalWidth <= 900;
          const lyricLeft = isNarrow
            ? clamp(20, physicalWidth * 0.05, 40)
            : clamp(34, physicalWidth * 0.062, 112);
          const detailArtSize = isNarrow
            ? Math.min(260, physicalWidth * 0.58)
            : Math.min(clamp(260, physicalWidth * 0.31, 390), physicalHeight - 144);

          root.style.setProperty("--castboard-rem-base", `${100 / density}px`);
          root.style.setProperty("--line-gap", `${clamp(22, physicalHeight * 0.042, 54) / density}px`);
          root.style.setProperty("--lyric-left", `${lyricLeft / density}px`);
          root.style.setProperty(
            "--lyric-width",
            isNarrow
              ? `calc(100vw - ${lyricLeft / density}px - ${lyricLeft / density}px)`
              : "80vw",
          );
          root.style.setProperty("--detail-art-size", `${Math.max(1, detailArtSize) / density}px`);
          root.classList.toggle("is-android-host", isAndroidHost);
          root.classList.toggle("is-castboard-narrow", isNarrow);
          root.classList.toggle("is-castboard-compact", physicalWidth <= 520);
        }

        window.__syncCastBoardViewport = syncViewportMetrics;
        syncViewportMetrics();
        window.addEventListener("resize", syncViewportMetrics);
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --castboard-rem-base: 100px;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
        --line-gap: clamp(0.22rem, 4.2vh, 0.54rem);
        --active-y: 30vh;
        --lyric-left: clamp(0.34rem, 6.2vw, 1.12rem);
        --lyric-width: 80vw;
        --detail-art-size: min(clamp(2.6rem, 31vw, 3.9rem), calc(100vh - 1.44rem));
        font-size: var(--castboard-rem-base);
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-Latin.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 1000;
        font-display: block;
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-LatinExt.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 1000;
        font-display: block;
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-Vietnamese.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 1000;
        font-display: block;
        unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;
      }

      @font-face {
        font-family: "CastBoard Source Han Sans SC";
        src: url("fonts/SourceHanSansSC-VF.ttf.woff2") format("woff2");
        font-style: normal;
        font-weight: 250 900;
        font-display: block;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050608;
        color: #f8fafc;
        user-select: none;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-size: 0.16rem;
        font-family:
          "CastBoard Google Sans Flex",
          "CastBoard Source Han Sans SC",
          "Google Sans Flex",
          "Source Han Sans SC",
          "SF Pro Display",
          "Segoe UI Variable Display",
          "Segoe UI",
          "Microsoft YaHei UI",
          "Noto Sans CJK SC",
          "Noto Sans SC",
          "Noto Sans",
          sans-serif;
      }

      .stage {
        position: fixed;
        inset: 0;
        overflow: hidden;
        opacity: 0;
        transition: opacity 220ms ease-out;
      }

      .stage.is-ready {
        opacity: 1;
      }

      .stage::before,
      .stage::after {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        height: 24vh;
        z-index: 2;
        pointer-events: none;
        will-change: transform;
        transform: translateZ(0);
      }

      .stage::before {
        top: 0;
        background: linear-gradient(to bottom, #050608 4%, rgba(5, 6, 8, 0));
      }

      .stage::after {
        bottom: 0;
        background: linear-gradient(to top, #050608 6%, rgba(5, 6, 8, 0));
      }

      .line {
        position: absolute;
        top: 0;
        left: var(--lyric-left);
        width: var(--lyric-width);
        margin: 0;
        text-align: left;
        color: #d8dee8;
        font-size: clamp(0.3rem, 5.2vw, 0.96rem);
        font-weight: 720;
        letter-spacing: 0;
        line-height: 1.16;
        overflow-wrap: break-word;
        word-break: normal;
        white-space: pre-line;
        transform-origin: left center;
        transform: translateY(var(--active-y)) scale(0.96);
        opacity: 0;
        pointer-events: none;
        will-change: transform, opacity;
        contain: layout style;
      }

      .line.is-current {
        color: #fffaf0;
      }

      .track-info {
        position: fixed;
        right: clamp(0.22rem, 4vw, 0.72rem);
        bottom: clamp(0.18rem, 4vh, 0.54rem);
        display: flex;
        align-items: baseline;
        justify-content: flex-end;
        gap: 0.55em;
        z-index: 4;
        max-width: 90vw;
        pointer-events: none;
        text-shadow: 0 0.02rem 0.18rem rgba(0, 0, 0, 0.54);
      }

      .track-info-title,
      .track-info-author {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: clamp(0.195rem, 2.025vw, 0.3rem);
        font-weight: 620;
        line-height: 1.2;
      }

      .track-info-title {
        color: rgba(255, 250, 240, 0.84);
        flex: 0 1 auto;
      }

      .track-info-author {
        color: rgba(216, 222, 232, 0.58);
        flex: 0 1000 auto;
        min-width: 20%;
      }

      .detail-layer[hidden] {
        display: none !important;
      }

      .detail-layer {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 0.72rem;
        background: #050608;
        backdrop-filter: blur(0.2rem) saturate(122%);
        opacity: 0;
        pointer-events: none;
        transform: scale(1.01);
        transition:
          opacity 220ms ease-out,
          transform 220ms ease-out;
      }

      .detail-layer.is-open {
        opacity: 1;
        pointer-events: auto;
        transform: none;
      }

      .detail-shell {
        display: grid;
        grid-template-columns: var(--detail-art-size) minmax(0, 1fr);
        align-items: start;
        gap: 0.64rem;
        width: min(11.8rem, 100%);
        max-height: 100%;
      }

      .detail-art {
        aspect-ratio: 1;
        width: var(--detail-art-size);
        height: var(--detail-art-size);
        overflow: hidden;
        border: 0.01rem solid rgba(248, 250, 252, 0.1);
        border-radius: 0.08rem;
        background:
          linear-gradient(145deg, rgba(248, 250, 252, 0.12), rgba(248, 250, 252, 0.02)),
          #111318;
        box-shadow: 0 0.28rem 0.8rem rgba(0, 0, 0, 0.42);
      }

      .detail-cover {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .detail-cover[hidden] {
        display: none !important;
      }

      .detail-copy {
        --detail-title-max: 0.86rem;
        --detail-title-min: 0.46rem;
        --detail-title-size: var(--detail-title-max);
        --detail-progress-bottom-offset: clamp(0.1rem, 1.6vh, 0.22rem);
        position: relative;
        height: var(--detail-art-size);
        min-width: 0;
      }

      .detail-title {
        margin: 0;
        color: #fffaf0;
        font-size: var(--detail-title-size);
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.02;
        overflow-wrap: anywhere;
      }

      .detail-author {
        margin: 0.26rem 0 0;
        color: rgba(248, 250, 252, 0.72);
        font-size: 0.32rem;
        font-weight: 620;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .detail-album {
        margin: 0.1rem 0 0;
        color: rgba(216, 222, 232, 0.5);
        font-size: 0.24rem;
        font-weight: 560;
        line-height: 1.3;
        overflow-wrap: anywhere;
      }

      .detail-progress {
        position: absolute;
        right: 0;
        bottom: var(--detail-progress-bottom-offset);
        left: 0;
        width: 100%;
      }

      .detail-progress-time {
        display: flex;
        justify-content: flex-end;
        gap: 0.08rem;
        margin-bottom: 0.12rem;
      }

      .detail-progress-track {
        height: 0.08rem;
        overflow: hidden;
        border-radius: 9.99rem;
        background: rgba(248, 250, 252, 0.18);
      }

      .detail-progress-fill {
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: #f8fafc;
        transition: width 180ms ease-out;
      }

      .detail-progress-elapsed,
      .detail-progress-duration,
      .detail-progress-separator {
        color: rgba(216, 222, 232, 0.62);
        font-size: 0.22rem;
        font-variant-numeric: tabular-nums;
        line-height: 1.2;
      }

      :root.is-castboard-narrow .detail-layer {
        place-items: start stretch;
        padding: 0.32rem 0.24rem;
      }

      :root.is-castboard-narrow .line {
        font-size: clamp(0.28rem, 8vw, 0.72rem);
      }

      :root.is-castboard-narrow .track-info {
        max-width: calc(100vw - 0.4rem);
      }

      :root.is-castboard-narrow .detail-shell {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 0.3rem;
        width: 100%;
      }

      :root.is-castboard-narrow .detail-art {
        width: var(--detail-art-size);
        height: var(--detail-art-size);
      }

      :root.is-castboard-narrow .detail-copy {
        --detail-title-max: 0.58rem;
        --detail-title-min: 0.36rem;
        position: static;
        height: auto;
      }

      :root.is-castboard-narrow .detail-title {
        font-size: var(--detail-title-size);
      }

      :root.is-castboard-narrow .detail-author {
        font-size: 0.28rem;
      }

      :root.is-castboard-narrow .detail-album {
        font-size: 0.21rem;
      }

      :root.is-castboard-narrow .detail-progress {
        position: static;
        margin-top: 0.4rem;
      }

      :root.is-castboard-compact .detail-layer {
        padding: 0.26rem 0.2rem;
      }

      :root.is-castboard-compact .detail-copy {
        --detail-title-max: 0.42rem;
        --detail-title-min: 0.3rem;
      }

      :root.is-castboard-compact .detail-author {
        margin-top: 0.2rem;
        font-size: 0.24rem;
      }

      :root.is-castboard-compact .detail-album {
        font-size: 0.18rem;
      }

      :root.is-castboard-compact .detail-progress {
        margin-top: 0.34rem;
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="歌词显示区"></main>
    <aside class="track-info" aria-label="播放信息" aria-live="polite" hidden>
      <span class="track-info-title"></span>
      <span class="track-info-author"></span>
    </aside>
    <section class="detail-layer" aria-label="歌曲详情" aria-live="polite" hidden>
      <div class="detail-shell">
        <div class="detail-art" aria-hidden="true">
          <img class="detail-cover" alt="" hidden />
        </div>
        <div class="detail-copy">
          <h1 class="detail-title"></h1>
          <p class="detail-author"></p>
          <p class="detail-album"></p>

          <div class="detail-progress" aria-label="播放进度">
            <div class="detail-progress-time">
              <span class="detail-progress-elapsed">0:00</span>
              <span class="detail-progress-separator" aria-hidden="true">/</span>
              <span class="detail-progress-duration">0:00</span>
            </div>
            <div class="detail-progress-track">
              <div class="detail-progress-fill"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="data.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
