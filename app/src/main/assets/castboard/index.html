<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>CastBoard</title>
    <style>
      :root {
        color-scheme: dark;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
        --line-gap: clamp(22px, 4.2vh, 54px);
        --active-y: 30vh;
        --lyric-left: 1em;
        --lyric-width: 80vw;
        --detail-art-size: 0px;
        font-size: 100px;
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-Latin.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 899;
        font-display: block;
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-Latin.woff2") format("woff2");
        font-style: normal;
        font-weight: 900 1000;
        font-variation-settings: "wght" 750;
        font-display: block;
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-LatinExt.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 899;
        font-display: block;
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-LatinExt.woff2") format("woff2");
        font-style: normal;
        font-weight: 900 1000;
        font-variation-settings: "wght" 750;
        font-display: block;
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-Vietnamese.woff2") format("woff2");
        font-style: normal;
        font-weight: 100 899;
        font-display: block;
        unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;
      }

      @font-face {
        font-family: "CastBoard Google Sans Flex";
        src: url("fonts/GoogleSansFlex-Vietnamese.woff2") format("woff2");
        font-style: normal;
        font-weight: 900 1000;
        font-variation-settings: "wght" 750;
        font-display: block;
        unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;
      }

      @font-face {
        font-family: "CastBoard Source Han Sans SC";
        src: url("fonts/SourceHanSansSC-VF.ttf.woff2") format("woff2");
        font-style: normal;
        font-weight: 250 899;
        font-display: block;
      }

      @font-face {
        font-family: "CastBoard Source Han Sans SC";
        src: url("fonts/SourceHanSansSC-VF.ttf.woff2") format("woff2");
        font-style: normal;
        font-weight: 900 1000;
        font-display: block;
      }

      @font-face {
        font-family: "CastBoard Source Han Sans SC";
        src: url("fonts/SourceHanSansSC-VF.ttf.woff2") format("woff2");
        font-style: normal;
        font-weight: 900 1000;
        font-variation-settings: "wght" 750;
        font-display: block;
        unicode-range: U+0000-00FF, U+0100-024F, U+0370-03FF, U+0400-04FF, U+0590-05FF;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050608;
        color: #f8fafc;
        user-select: none;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        font-size: clamp(14px, 2vh, 16px);
        font-family:
          "CastBoard Google Sans Flex",
          "CastBoard Source Han Sans SC",
          "Google Sans Flex",
          "Source Han Sans SC",
          "SF Pro Display",
          "Segoe UI Variable Display",
          "Segoe UI",
          "Microsoft YaHei UI",
          "Noto Sans CJK SC",
          "Noto Sans SC",
          "Noto Sans",
          sans-serif;
      }

      .stage {
        position: fixed;
        inset: 0;
        overflow: hidden;
        opacity: 0;
        transition: opacity 220ms ease-out;
      }

      .stage.is-ready {
        opacity: 1;
      }

      .stage::before,
      .stage::after {
        content: "";
        position: absolute;
        left: 0;
        width: 100%;
        height: 24vh;
        z-index: 2;
        pointer-events: none;
        will-change: transform;
        transform: translateZ(0);
      }

      .stage::before {
        top: 0;
        background: linear-gradient(to bottom, #050608 4%, rgba(5, 6, 8, 0));
      }

      .stage::after {
        bottom: 0;
        background: linear-gradient(to top, #050608 6%, rgba(5, 6, 8, 0));
      }

      .line {
        position: absolute;
        top: 0;
        left: var(--lyric-left);
        width: var(--lyric-width);
        margin: 0;
        text-align: left;
        color: #d8dee8;
        font-size: clamp(42px, min(6.4vw, 13vh), 100px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.16;
        overflow-wrap: break-word;
        word-break: normal;
        white-space: pre-line;
        transform-origin: left center;
        transform: translateY(var(--active-y)) scale(0.96);
        opacity: 0;
        pointer-events: none;
        will-change: transform, opacity;
        contain: layout style;
      }

      .line.is-current {
        color: #fffaf0;
      }

      .track-info {
        position: fixed;
        right: 4vw;
        bottom: 2vw;
        display: flex;
        align-items: baseline;
        justify-content: flex-end;
        gap: 0.55em;
        z-index: 4;
        max-width: 90vw;
        pointer-events: none;
      }

      .track-info-title,
      .track-info-author {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: clamp(18px, 2.6vh, 34px);
        font-weight: 700;
        line-height: 1.2;
      }

      .track-info-title {
        color: rgba(255, 250, 240, 0.84);
        flex: 0 1 auto;
      }

      .track-info-author {
        color: rgba(216, 222, 232, 0.58);
        flex: 0 1000 auto;
        min-width: 20%;
      }

      .detail-layer[hidden] {
        display: none !important;
      }

      .detail-layer {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 3.75vw;
        background: #000000;
        opacity: 0;
        pointer-events: none;
        transform: scale(1.01);
        transition:
          opacity 220ms ease-out,
          transform 220ms ease-out;
      }

      .detail-layer.is-open {
        opacity: 1;
        pointer-events: auto;
        transform: none;
      }

      .detail-shell {
        display: grid;
        grid-template-columns: var(--detail-art-size) minmax(0, 1fr);
        align-items: start;
        gap: 5vw;
        width: min(86vw, 100%);
        max-height: 100%;
      }

      .detail-art {
        aspect-ratio: 1;
        width: var(--detail-art-size);
        height: var(--detail-art-size);
        overflow: hidden;
        border: 0.05vw solid rgba(248, 250, 252, 0.1);
        border-radius: 0.63vw;
        background:
          linear-gradient(145deg, rgba(248, 250, 252, 0.12), rgba(248, 250, 252, 0.02)),
          #111318;
        box-shadow: 0 2.2vw 6.25vw rgba(0, 0, 0, 0.42);
      }

      .detail-cover {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .detail-cover[hidden] {
        display: none !important;
      }

      .detail-copy {
        --detail-title-max: clamp(4.2vw, 18.5vh, 7.8vw);
        --detail-title-min: clamp(2.9vw, 10vh, 4.2vw);
        --detail-title-size: var(--detail-title-max);
        --detail-progress-bottom-offset: clamp(0.78vw, 2.4vh, 1.72vw);
        position: relative;
        height: var(--detail-art-size);
        min-width: 0;
      }

      .detail-title {
        margin: 0;
        margin-top: 0.25vw;
        color: #fffaf0;
        font-size: var(--detail-title-size);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1.02;
        overflow-wrap: anywhere;
      }

      .detail-meta-row {
        display: flex;
        align-items: baseline;
        gap: 1.5vw;
        margin: 2vw 0 0;
      }

      .detail-author {
        color: rgba(248, 250, 252, 0.72);
        font-size: clamp(2.2vw, 7.5vh, 3vw);
        font-weight: 700;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .detail-album {
        color: rgba(216, 222, 232, 0.5);
        font-size: clamp(2.2vw, 7.5vh, 3vw);
        font-weight: 700;
        line-height: 1.3;
        overflow-wrap: anywhere;
      }

      .detail-progress {
        position: absolute;
        right: 0;
        bottom: var(--detail-progress-bottom-offset);
        left: 0;
        width: 100%;
      }

      .detail-progress-time {
        display: flex;
        justify-content: flex-end;
        gap: 0.25vw;
        margin-bottom: 0.94vw;
      }

      .detail-progress-track {
        height: 0.63vw;
        overflow: hidden;
        border-radius: 9.99rem;
        background: rgba(248, 250, 252, 0.18);
      }

      .detail-progress-fill {
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: #f8fafc;
        transition: width 180ms ease-out;
      }

      .detail-progress-elapsed,
      .detail-progress-duration,
      .detail-progress-separator {
        font-family: "CastBoard Google Sans Flex", "Google Sans Flex", sans-serif;
        color: rgba(216, 222, 232, 0.62);
        font-size: clamp(2vw, 6.5vh, 2.8vw);
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

    </style>
  </head>
  <body>
    <main class="stage" aria-label="Lyrics"></main>
    <aside class="track-info" aria-label="Playback Info" aria-live="polite" hidden>
      <span class="track-info-title"></span>
      <span class="track-info-author"></span>
    </aside>
    <section class="detail-layer" aria-label="Track Details" aria-live="polite" hidden>
      <div class="detail-shell">
        <div class="detail-art" aria-hidden="true">
          <img class="detail-cover" alt="" hidden />
        </div>
        <div class="detail-copy">
          <h1 class="detail-title"></h1>
          <div class="detail-meta-row">
            <span class="detail-author"></span>
            <span class="detail-album"></span>
          </div>

          <div class="detail-progress" aria-label="Playback Progress">
            <div class="detail-progress-time">
              <span class="detail-progress-elapsed">0:00</span>
              <span class="detail-progress-separator" aria-hidden="true">/</span>
              <span class="detail-progress-duration">0:00</span>
            </div>
            <div class="detail-progress-track">
              <div class="detail-progress-fill"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="data.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
